<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHATEVER</title>
  <link rel="stylesheet" href="styles-game.css">
  <link rel="stylesheet" href="global.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
</head>
<body>
  <div class="main-container">
    <div class="upper-wrapper">
      <div class="quote" style="cursor: pointer;">
        Down for a chat?
      </div>
      <button id="theme-toggle" class="theme-btn">
        <div class="theme-btn-outer"><div class="theme-btn-inner"></div></div>
      </button>
    </div>
    
    <div class="questions-wrapper">
      <div class="questions-type"></div>
      <div class="question" style="user-select: none; line-height: 1.1;"></div>
    </div>
    
    <div class="lower-wrapper">
      <div class="filter" id="open-overlay" style="cursor: pointer;">Questions filter</div>
      <div class="form" style="cursor: pointer;text-decoration: none;color:inherit;"><a href="https://forms.gle/mzC47CVwd4e5JzVK9">Submit your question</a></div>
    </div>
  </div>

  <div class="overlay">
    <div style="display: flex; flex-direction: column; gap: 2.5rem;">
      <div class="overlay-title">Hate a question? Strike it down!!!</div>
      <div class="categories">
        <div class="category">All</div>
        <div class="category">Smitten & Bitten</div>
        <div class="category">Life is a Lemon</div>
        <div class="category">Just silly things</div>
        <div class="category">Know you better</div>
      </div>
    </div>
    <div  class="questions-list"></div>
  </div>
  <script>
    // 1. Theme Dark/Light Toggling
    const toggleBtn = document.getElementById('theme-toggle');
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
    });

    const overlay = document.querySelector('.overlay');
    const openTrigger = document.getElementById('open-overlay');

    // Open overlay
    openTrigger.addEventListener('click', () => {
      overlay.classList.add('active');
    });

    overlay.addEventListener('click', (e) => {
      // If the user clicked the overlay wrapper itself (not its children), close it
      if (e.target === overlay) {
        overlay.classList.remove('active');
      }
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
